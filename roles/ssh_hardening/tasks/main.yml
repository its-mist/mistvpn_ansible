---
# 1. Кладём ключ ПЕРЕД тем как отключить пароли — иначе потеряем доступ
- name: Ensure .ssh directory exists for {{ ssh_user }}
  ansible.builtin.file:
    path: "/{{ 'root' if ssh_user == 'root' else 'home/' + ssh_user }}/.ssh"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0700"

- name: Add SSH public key to authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ssh_user }}"
    state: present
    key: "{{ ssh_public_key }}"

# 2. Hardening sshd_config
- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Enable public key authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Disable challenge-response auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication'
    line: 'ChallengeResponseAuthentication no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

- name: Disable empty passwords
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitEmptyPasswords'
    line: 'PermitEmptyPasswords no'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd
