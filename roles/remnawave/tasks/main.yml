---
- name: Ensure curl is installed
  ansible.builtin.package:
    name: curl
    state: present

- name: Install expect utility
  ansible.builtin.package:
    name: expect
    state: present

# Скачиваем скрипт, пинним конкретный коммит + проверяем checksum.
# Если авторы обновили скрипт — таска упадёт здесь, до запуска диалога.
- name: Download remnawave install script (pinned commit)
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/eGamesAPI/remnawave-reverse-proxy/{{ remnawave_script_commit }}/install_remnawave.sh"
    dest: /tmp/install_remnawave.sh
    mode: "0755"
    checksum: "{{ remnawave_script_sha256 }}"
    force: true

# Генерируем expect-скрипт из шаблона (подставляем переменные)
- name: Deploy expect script from template
  ansible.builtin.template:
    src: install_expect.j2
    dest: /tmp/install_remnawave_expect.sh
    mode: "0755"

# Запускаем через системный expect — он надёжнее pexpect-модуля
- name: Run remnawave installer via expect
  ansible.builtin.shell: /tmp/install_remnawave_expect.sh
  register: remnawave_install_result
  no_log: true

- name: Show installer result
  ansible.builtin.debug:
    msg: "Remnawave installed. Panel: https://{{ node_domain }}"
  when: remnawave_install_result.rc == 0

# Убираем временные файлы
- name: Remove installer files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/install_remnawave.sh
    - /tmp/install_remnawave_expect.sh
